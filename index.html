                ctx.lineTo(centerX - 15, h);
                ctx.bezierCurveTo(centerX - 15, 330, centerX - 5, 290, centerX, centerY + 100 + jY*0.5);
                ctx.bezierCurveTo(centerX + 5, 290, centerX + 15, 330, centerX + 15, h);
                ctx.lineTo(centerX + 120, h);
                ctx.bezierCurveTo(centerX + 130, h - 30, centerX + 140 + jX, 320, centerX + 150 + jX, centerY + 30);
                ctx.bezierCurveTo(centerX + 160 + jX, 110, centerX + 40, 50, centerX + 90, 0);
                ctx.lineTo(centerX - 90, 0);
                ctx.fill(); ctx.stroke();

                // Gluteal folds
                ctx.strokeStyle = cSkinShadow; ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.moveTo(centerX - 130, centerY + 50);
                ctx.quadraticCurveTo(centerX - 80, centerY + 110, centerX - 30, centerY + 70);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(centerX + 130, centerY + 50);
                ctx.quadraticCurveTo(centerX + 80, centerY + 110, centerX + 30, centerY + 70);
                ctx.stroke();

                // Dimples
                ctx.fillStyle = cSkinShadow;
                ctx.beginPath(); ctx.ellipse(centerX - 40, centerY - 85, 4, 8, 0.2, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(centerX + 40, centerY - 85, 4, 8, -0.2, 0, Math.PI*2); ctx.fill();

                let innerStretch = 1 + currentStretch * 0.4 - (frictionDrag * 0.25);
                let outerStretch = 1 + currentStretch * 0.05 - (frictionDrag * 0.15);
                let breath = Math.sin(time * 0.45) * 1.0;
                let numFolds = 16;

                // --- WINK (KASILMA) EFEKTİ ---
                if (typeof staff.winkTimer === 'undefined') staff.winkTimer = 0;
                if (typeof staff.winkCooldown === 'undefined') staff.winkCooldown = 10000;
                if (typeof staff.timeWithoutPenis === 'undefined') staff.timeWithoutPenis = 0;
                
                let isPenisOut = !currentCustomer || !staff.isServing || offset < 40;
                
                if (isPenisOut) {
                    staff.timeWithoutPenis += dtGlobal || 16.66;
                } else {
                    staff.timeWithoutPenis = 0;
                    staff.winkTimer = 0;
                }
                
                if (staff.timeWithoutPenis >= 4000) {
                    if (staff.winkCooldown > 0) {
                        staff.winkCooldown -= dtGlobal || 16.66;
                    } else {
                        staff.winkTimer = 1000; 
                        staff.winkCooldown = 10000; 
                    }
                }
                
                let winkPhase = 0; 
                if (staff.winkTimer > 0) {
                    staff.winkTimer -= dtGlobal || 16.66;
                    winkPhase = Math.pow(Math.sin((Math.max(0, staff.winkTimer) / 1000) * Math.PI), 1.5); 
                }

                let baseHoleX = Math.min((dynamicHoleSize * 0.5 + breath * 0.3) * innerStretch * horizontalTension, dynamicHoleSize * 0.55);
                let baseHoleY = Math.min((dynamicHoleSize * 0.7 + breath * 0.3) * innerStretch, dynamicHoleSize * 0.77);
                let currentBase = staff.baseHoleSize || 6;
                let winkTargetX = currentBase * 0.5;
                let winkTargetY = currentBase * 0.7;
                let holeRadiusX = baseHoleX * (1 - winkPhase) + (winkTargetX * winkPhase);
                let holeRadiusY = baseHoleY * (1 - winkPhase) + (winkTargetY * winkPhase);
                let depth = 40 + offset; 
                if (suction > 0 && depth > 0) {
                    let effectiveSuction = Math.min(2.0, suction); 
                    let baseRadius = 24 + ((pm.shaftWidth || 0) * 0.5); 
                    
                    let targetRadius = baseRadius;
                    if (depth < 35) {
                        targetRadius = baseRadius * Math.pow(depth / 35, 0.6);
                    }
                    
                    let handoff = Math.max(0, 1 - (depth / 10));
                    holeRadiusX = Math.max(holeRadiusX * handoff, targetRadius + 0.5);
                    holeRadiusY = Math.max(holeRadiusY * handoff, (targetRadius * 0.5) + 0.5);
                }

                // --- VAGINAL OR ANAL OVERRIDES ---
                const isVajinal = (slotIndex % 2 === 0);
                
                // Define the physical coordinates of the vagina (vulvaY)
                let vulvaY = centerY + 80 + (isVajinal ? dynamicHoleSize * 0.8 : base * 0.8);
                
                // serviceCenterY is where penetration happens
                let serviceCenterY = isVajinal ? vulvaY : centerY;

                // Anus overrides (if vaginal service is active, anus remains closed/idle)
                let anusHoleSize = isVajinal ? base : dynamicHoleSize;
                let anusInnerStretch = isVajinal ? 1.0 : innerStretch;
                let anusOuterStretch = isVajinal ? 1.0 : outerStretch;
                let anusHoleRadiusX = isVajinal ? base * 0.5 : holeRadiusX;
                let anusHoleRadiusY = isVajinal ? base * 0.7 : holeRadiusY;
                let anusRedness = isVajinal ? 0.0 : (staff.holeRedness || 0);

                // Vulva width stretching factor
                let vulvaWidthFactor = isVajinal ? (1 + currentStretch * 0.6) : 1.0;

                // Elongated Vertical Crack Line
                ctx.strokeStyle = cSkinShadow; ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY - 150); 
                ctx.quadraticCurveTo(centerX - 2, centerY - 10, centerX, vulvaY - 20);
                ctx.stroke();

                // --- 1. VAGINA / VULVA RENDERING ---
                // Vulva
                let vulvaGradOuter = ctx.createRadialGradient(centerX, vulvaY + 5, 5, centerX, vulvaY + 5, 30);
                vulvaGradOuter.addColorStop(0, '#c77d5b'); 
                vulvaGradOuter.addColorStop(0.6, '#d49b77'); 
                vulvaGradOuter.addColorStop(1, 'rgba(238, 187, 153, 0)'); 
                ctx.fillStyle = vulvaGradOuter; 
                ctx.beginPath();
                ctx.moveTo(centerX, vulvaY - 30);
                ctx.bezierCurveTo(centerX - 25 * vulvaWidthFactor, vulvaY - 10, centerX - 18 * vulvaWidthFactor, vulvaY + 30, centerX, vulvaY + 40);
                ctx.bezierCurveTo(centerX + 18 * vulvaWidthFactor, vulvaY + 30, centerX + 25 * vulvaWidthFactor, vulvaY - 10, centerX, vulvaY - 30);
                ctx.fill(); 
                
                ctx.fillStyle = cHole;
                ctx.lineWidth = 2; ctx.strokeStyle = cOutline;
                ctx.beginPath();
                ctx.moveTo(centerX, vulvaY - 20);
                ctx.bezierCurveTo(centerX - 10 * vulvaWidthFactor, vulvaY - 5, centerX - 8 * vulvaWidthFactor, vulvaY + 20, centerX, vulvaY + 30);
                ctx.bezierCurveTo(centerX + 8 * vulvaWidthFactor, vulvaY + 20, centerX + 10 * vulvaWidthFactor, vulvaY - 5, centerX, vulvaY - 20);
                ctx.fill(); ctx.stroke(); 
                
                if (isVajinal && holeRadiusX > 1.5) {
                    // Draw the opened vagina inside the vulva
                    ctx.fillStyle = cOutline;
                    ctx.beginPath();
                    ctx.ellipse(centerX, vulvaY + 5, holeRadiusX, holeRadiusY, 0, 0, Math.PI*2);
                    ctx.fill();
                } else {
                    ctx.beginPath(); ctx.moveTo(centerX, vulvaY - 18); ctx.lineTo(centerX, vulvaY + 28); ctx.stroke();
                }

                // --- 2. ANUS / AREOLA RENDERING ---
                let rMax = Math.max(45, anusHoleSize * 1.8) * anusOuterStretch;
                let innerGradR = Math.max(0.1, anusHoleRadiusX * 0.8);
                let holeGrad = ctx.createRadialGradient(centerX, centerY, innerGradR, centerX, centerY, rMax);
                
                let hr = anusRedness;
                let c0_r = Math.round(180 + (80 - 180) * hr);
                let c0_g = Math.round(110 + (10 - 110) * hr);
                let c0_b = Math.round(100 + (10 - 100) * hr);
                
                let c1_r = Math.round(212 + (165 - 212) * hr);
                let c1_g = Math.round(148 + (82 - 148) * hr);
                let c1_b = Math.round(121 + (82 - 121) * hr);
                
                let cs_r = Math.round(190 + (143 - 190) * hr); 
                let cs_g = Math.round(120 + (47 - 120) * hr);  
                let cs_b = Math.round(100 + (47 - 100) * hr);  
                let currentHoleShadow = `rgb(${cs_r}, ${cs_g}, ${cs_b})`;
                holeGrad.addColorStop(0, `rgb(${c0_r}, ${c0_g}, ${c0_b})`); 
                holeGrad.addColorStop(0.2, `rgb(${c1_r}, ${c1_g}, ${c1_b})`); 
                holeGrad.addColorStop(0.6, `rgba(${c1_r}, ${c1_g}, ${c1_b}, 0.6)`); 
                holeGrad.addColorStop(1, 'rgba(238, 187, 153, 0)'); 
                
                ctx.fillStyle = holeGrad;
                ctx.beginPath();
                for (let i = 0; i <= numFolds; i++) {
                    let angle = (i / numFolds) * Math.PI * 2;
                    let r = anusHoleSize * 1.5 + Math.sin(i*4)*anusHoleSize*0.25 + breath;
                    let x = centerX + Math.cos(angle) * r * anusOuterStretch;
                    let y = centerY + Math.sin(angle) * r * anusOuterStretch;
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.fill(); 
                
                // Wrinkles
                let wOp = 0.1 + (anusRedness * 0.9); 
                ctx.strokeStyle = `rgba(44, 31, 26, ${wOp})`; 
                ctx.lineWidth = 1.5;
                for(let i=0; i<12; i++) {
                    let angle = (i/12)*Math.PI*2 + 0.1;
                    ctx.beginPath();
                    let r1 = anusHoleSize*0.8 * anusInnerStretch;
                    let r2 = (anusHoleSize*1.5 + breath) * anusOuterStretch; 
                    
                    ctx.moveTo(centerX + Math.cos(angle)*r1, centerY + Math.sin(angle)*r1);
                    ctx.lineTo(centerX + Math.cos(angle)*r2, centerY + Math.sin(angle)*r2);
                    ctx.stroke();
                }
                if (anusHoleSize > 12) {
                    ctx.fillStyle = currentHoleShadow;
                    ctx.beginPath();
                    ctx.moveTo(centerX - anusHoleSize*0.6*anusOuterStretch, centerY);
                    ctx.quadraticCurveTo(centerX, centerY + anusHoleSize*1.8 + breath, centerX + anusHoleSize*0.6*anusOuterStretch, centerY);
                    ctx.fill(); 
                }
                // Inner Anus Hole (Draws outline/depth)
                ctx.fillStyle = cOutline;
                ctx.beginPath();
                ctx.ellipse(centerX, centerY, anusHoleRadiusX, anusHoleRadiusY, 0, 0, Math.PI*2);
                ctx.fill();

                // Veins on the active target area
                let veinOp = 0.35 * (staff.holeRedness || 0);
                ctx.strokeStyle = `rgba(70, 90, 110, ${veinOp})`; ctx.lineWidth = 1.0;
                let normalVeinR1X = (isVajinal ? dynamicHoleSize : base) * 0.5 * innerStretch + 1;
                let normalVeinR1Y = (isVajinal ? dynamicHoleSize : base) * 0.7 * innerStretch + 1;
                let normalVeinLength = Math.max(5, (isVajinal ? dynamicHoleSize : base) * 0.6); 
                
                for (let i = 0; i < 9; i++) {
                    let angle = (i / 9) * Math.PI * 2 + 0.3;
                    
                    let r1X = (isVajinal ? holeRadiusX : (base * 0.5)) + 1; 
                    let r1Y = (isVajinal ? holeRadiusY : (base * 0.7)) + 1;
                    
                    let r2X = normalVeinR1X + (normalVeinLength * 0.9);
                    let r2Y = normalVeinR1Y + (normalVeinLength * 0.9);
                    
                    let vStartX = centerX + Math.cos(angle) * r1X;
                    let vStartY = serviceCenterY + Math.sin(angle) * r1Y;
                    let vEndX = centerX + Math.cos(angle) * r2X;
                    let vEndY = serviceCenterY + Math.sin(angle) * r2Y;
                    
                    drawWigglyLine(vStartX, vStartY, vEndX, vEndY, 3, 2, i + 1.5);
                    
                    if (i % 2 === 0) {
                        let midX = centerX + Math.cos(angle) * (r1X+r2X)*0.5;
                        let midY = serviceCenterY + Math.sin(angle) * (r1Y+r2Y)*0.5;
                        let branchRX = normalVeinR1X + normalVeinLength;
                        let branchRY = normalVeinR1Y + normalVeinLength;
                        let branchEndX = centerX + Math.cos(angle - 0.05) * branchRX;
                        let branchEndY = serviceCenterY + Math.sin(angle - 0.05) * branchRY;
                        drawWigglyLine(midX, midY, branchEndX, branchEndY, 2, 1.5, i + 7.2);
                    }
                }

                // --- 4. CUSTOMER (PENİS ÇİZİMİ) ---
                if (staff.isServing) {
                    let custSkin = '#eab29a';
                    let custGlans = '#d45d5d';
                    if (currentCustomer && currentCustomer.type === 'black') {
                        custSkin = '#6d4332';
                        custGlans = '#5c2d2d';
                    }

                    ctx.save();
                    ctx.translate(centerX, serviceCenterY);
                    ctx.rotate(Math.PI);
                    ctx.translate(-centerX, -serviceCenterY);

                    let pWidth = 48 + pm.shaftWidth;
                    let pHeight = 180 + pm.shaftLength;
                    let pX = centerX - pWidth/2;
                    let pY = serviceCenterY - 160 + offset - pm.shaftLength;

                    // Testicles
                    let ballInertia = frictionDrag * -4;
                    let ballWobble = wobble * 4;
                    let bYOffset = (pY - 10) + ballInertia + ballWobble;
                    let bxL = centerX - 20 + (wobbleX * 4);
                    let bxR = centerX + 20 + (wobbleX * 4);
                    
                    ctx.fillStyle = custSkin; ctx.lineWidth = 3; ctx.strokeStyle = cOutline;
                    let tSize = pm.testicleSize;
                    ctx.beginPath(); ctx.ellipse(bxL, bYOffset, 32 + tSize, 38 + tSize, -0.2, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                    ctx.beginPath(); ctx.ellipse(bxR, bYOffset + 8, 30 + tSize, 40 + tSize, 0.2, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

                    // Mask inside penetration hole
                    ctx.save();
                    ctx.beginPath();
                    ctx.rect(0, 0, w, serviceCenterY);
                    ctx.ellipse(centerX, serviceCenterY, holeRadiusX + 0.5, holeRadiusY + 0.5, 0, Math.PI * 2, Math.PI);
                    ctx.clip();

                    // Shaft
                    ctx.fillStyle = custSkin;
                    ctx.beginPath();
                    ctx.moveTo(pX, pY);
                    let bY = pY + (pHeight - 35) * 0.4;
                    let piY = pY + (pHeight - 35) * 0.95;
                    ctx.bezierCurveTo(pX + pm.shaftCurve, bY, pX + pm.shaftCurve, piY, pX, piY);
                    ctx.lineTo(pX, pY + pHeight - 35);
                    ctx.lineTo(pX + pWidth, pY + pHeight - 35);
                    ctx.lineTo(pX + pWidth, piY);
                    ctx.bezierCurveTo(pX + pWidth + pm.shaftCurve, piY, pX + pWidth + pm.shaftCurve, bY, pX + pWidth, pY);
                    ctx.fill(); ctx.stroke();

                    // Glans
                    ctx.fillStyle = custGlans;
                    let gW = pm.glansWidth || 0;
                    let gH = pm.glansHeight || 0;
                    ctx.beginPath();
                    ctx.moveTo(pX, pY + pHeight - 35);
                    ctx.bezierCurveTo(pX - gW, pY + pHeight - 25 - gH, pX + 5, pY + pHeight + gH, centerX, pY + pHeight + gH);
                    ctx.bezierCurveTo(pX + pWidth - 5, pY + pHeight + gH, pX + pWidth + gW, pY + pHeight - 25 - gH, pX + pWidth, pY + pHeight - 35);
                    ctx.fill(); ctx.stroke();

                    // Pubic hair shadow and hair
                    let fupaY = pY - 20;
                    let shadowGrad = ctx.createRadialGradient(centerX, fupaY, 10, centerX, fupaY, 50);
                    shadowGrad.addColorStop(0, 'rgba(0,0,0,0.3)');
                    shadowGrad.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = shadowGrad;
                    ctx.beginPath(); ctx.ellipse(centerX, fupaY, 60, 40, 0, 0, Math.PI*2); ctx.fill();

                    // Pubic hair lines
                    ctx.strokeStyle = cHair; ctx.lineWidth = 1.0;
                    let hairCount = 50 + (pm.hairDensity || 0.5) * 150;
                    ctx.beginPath();
                    for(let h=0; h<hairCount; h++) {
                        let rand1 = Math.sin(h * 12.9898) * 43758.5453 % 1;
                        let rand2 = Math.sin(h * 78.233) * 43758.5453 % 1;
                        let hrx = centerX - 40 + Math.abs(rand1) * 80;
                        let hry = fupaY - 15 + Math.abs(rand2) * 30;
                        ctx.moveTo(hrx, hry);
                        ctx.quadraticCurveTo(hrx + rand1*8, hry - 6, hrx + rand2*10, hry + 8);
                    }
                    ctx.stroke();

                    ctx.restore(); // end mask clip
                    ctx.restore(); // end rotate/translate

                    // Fluids drawing if cumming
                    if (staff.isCumming) {
                        ctx.fillStyle = cCum; ctx.strokeStyle = cOutline; ctx.lineWidth = 1.5;
                        for (let i = 0; i < ac.cumDropCount; i++) {
                            let ox = centerX + Math.sin(time*4 + i) * 6;
                            let oy = serviceCenterY + 10 + ((time*150 + i*25) % 100);
                            ctx.beginPath(); ctx.ellipse(ox, oy, 3, 4.5, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                        }
                    }
                }

                ctx.restore(); // end globalY translate
                ctx.restore(); // end scale translate
            });

            requestAnimationFrame(renderCanvases);
        }

        // --- 9. INITIALIZATION & EVENT LOOPS ---
        let lastTime = Date.now();
        function gameLoop() {
            let now = Date.now();
            let dt = now - lastTime;
            lastTime = now;

            // Tick active serving timers
            triggerServingTick(dt);

            setTimeout(gameLoop, 100);
        }

        // Spawn customer every 6 seconds if queue has space
        setInterval(() => {
            if (GameState.customersQueue.length < 5) {
                GameState.customersQueue.push(generateCustomer("cust_" + Date.now()));
                renderQueue();
            }
        }, 6000);

        // Bind Start Screen
        const btnStart = document.getElementById('btn-start-game');
        if (btnStart) {
            btnStart.addEventListener('click', () => {
                document.getElementById('menu-screen').classList.add('hidden');
                initGame();
                
                // Hide Safari toolbar on iOS by scrolling
                setTimeout(() => {
                    window.scrollTo(0, 1);
                }, 100);
            });
        }

        // --- TOUCH DRAG & DROP CONTROLLER FOR MOBILE ---
        let activeTouchDrag = null;

        document.addEventListener('touchstart', (e) => {
            const avatar = e.target.closest('.ty-customer-avatar');
            if (!avatar) return;

            const customerId = avatar.id.replace('cust-avatar-', '');
            if (!customerId) return;

            e.preventDefault(); // Prevent scrolling/zooming while dragging

            const touch = e.targetTouches[0];
            const frame = document.querySelector('.mobile-frame');
            const frameRect = frame.getBoundingClientRect();

            // Create a floating clone/indicator
            const floatEl = document.createElement('div');
            floatEl.className = 'touch-drag-avatar';
            floatEl.style.position = 'absolute';
            floatEl.style.width = '48px';
            floatEl.style.height = '48px';
            floatEl.style.borderRadius = '50%';
            floatEl.style.border = '2px solid var(--btn-blue)';
            floatEl.style.background = avatar.style.background || '#ffefd5';
            floatEl.style.boxShadow = '0 8px 16px rgba(0,0,0,0.2)';
            floatEl.style.pointerEvents = 'none';
            floatEl.style.zIndex = '9999';
            floatEl.style.opacity = '0.9';

            floatEl.innerHTML = avatar.innerHTML;
            
            const x = touch.clientX - frameRect.left - 24;
            const y = touch.clientY - frameRect.top - 24;
            floatEl.style.left = x + 'px';
            floatEl.style.top = y + 'px';

            frame.appendChild(floatEl);

            activeTouchDrag = {
                customerId: customerId,
                floatEl: floatEl,
                touchId: touch.identifier
            };
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
            if (!activeTouchDrag) return;

            let touch = null;
            for (let i = 0; i < e.touches.length; i++) {
                if (e.touches[i].identifier === activeTouchDrag.touchId) {
                    touch = e.touches[i];
                    break;
                }
            }
            if (!touch) return;

            e.preventDefault();

            const frame = document.querySelector('.mobile-frame');
            const frameRect = frame.getBoundingClientRect();

            const x = touch.clientX - frameRect.left - 24;
            const y = touch.clientY - frameRect.top - 24;
            activeTouchDrag.floatEl.style.left = x + 'px';
            activeTouchDrag.floatEl.style.top = y + 'px';

            const el = document.elementFromPoint(touch.clientX, touch.clientY);
            const slotCard = el ? el.closest('.ty-room-card') : null;

            document.querySelectorAll('.ty-room-card').forEach(card => {
                if (!card.classList.contains('locked')) {
                    card.style.borderColor = '';
                    card.style.boxShadow = '';
                }
            });

            if (slotCard && !slotCard.classList.contains('locked')) {
                const slotIndex = parseInt(slotCard.id.replace('slot-card-', ''));
                const staff = GameState.staff[slotIndex];
                if (staff && !staff.activeCustomer) {
                    slotCard.style.borderColor = 'var(--btn-green)';
                    slotCard.style.boxShadow = '0 0 12px rgba(81, 207, 102, 0.3)';
                }
            }
        }, { passive: false });

        document.addEventListener('touchend', (e) => {
            if (!activeTouchDrag) return;

            let touch = null;
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === activeTouchDrag.touchId) {
                    touch = e.changedTouches[i];
                    break;
                }
            }

            if (touch) {
                const el = document.elementFromPoint(touch.clientX, touch.clientY);
                const slotCard = el ? el.closest('.ty-room-card') : null;

                if (slotCard && !slotCard.classList.contains('locked')) {
                    const slotIndex = parseInt(slotCard.id.replace('slot-card-', ''));
                    const staff = GameState.staff[slotIndex];
                    if (staff && !staff.activeCustomer) {
                        assignCustomerToSlot(activeTouchDrag.customerId, slotIndex);
                    }
                }
            }

            activeTouchDrag.floatEl.remove();
            activeTouchDrag = null;

            document.querySelectorAll('.ty-room-card').forEach(card => {
                card.style.borderColor = '';
                card.style.boxShadow = '';
            });
        });

        // Init loops
        gameLoop();
        renderCanvases();

    </script>
